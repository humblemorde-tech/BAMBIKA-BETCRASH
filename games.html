<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BAMBIKA BETCRASH - Games</title>

    <!-- GLOBAL CORE STYLE (must load first) -->
    <link rel="stylesheet" href="css/style.css">

    <!-- PAGE SPECIFIC -->
    <link rel="stylesheet" href="css/games.css">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="topbar">
    <div class="logo">
        <img src="assets/logo.png" alt="Logo">
        <span>BAMBIKA BETCRASH</span>
    </div>

    <nav class="nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="wallet.html">Wallet</a>
        <a href="games.html" class="active">Games</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="profile.html">Profile</a>
    </nav>
</header>

<!-- ================= MAIN CONTENT ================= -->
<main class="games-container">

    <!-- FILTER BAR -->
    <section class="games-filters">
        <button class="filter-btn active" data-filter="all">All Games</button>
        <button class="filter-btn" data-filter="crash">Crash</button>
        <button class="filter-btn" data-filter="casino">Casino</button>
        <button class="filter-btn" data-filter="slots">Slots</button>
    </section>

    <!-- GAMES GRID -->
    <section class="games-grid" id="gamesGrid">

        <!-- GAME CARD 1 -->
        <div class="game-card" data-type="crash">
            <div class="game-image crash-bg"></div>
            <div class="game-info">
                <h3>Crash X</h3>
                <p>Multiplier-based crash betting game</p>
                <button onclick="startGame('crash')">Play Now</button>
            </div>
        </div>

        <!-- GAME CARD 2 -->
        <div class="game-card" data-type="casino">
            <div class="game-image roulette-bg"></div>
            <div class="game-info">
                <h3>Roulette</h3>
                <p>Classic casino wheel game</p>
                <button onclick="startGame('roulette')">Play Now</button>
            </div>
        </div>

        <!-- GAME CARD 3 -->
        <div class="game-card" data-type="slots">
            <div class="game-image slots-bg"></div>
            <div class="game-info">
                <h3>Lucky Slots</h3>
                <p>Spin and win big rewards</p>
                <button onclick="startGame('slots')">Play Now</button>
            </div>
        </div>

        <!-- GAME CARD 4 -->
        <div class="game-card" data-type="crash">
            <div class="game-image turbo-bg"></div>
            <div class="game-info">
                <h3>Turbo Crash</h3>
                <p>Fast-paced crash rounds</p>
                <button onclick="startGame('turbo-crash')">Play Now</button>
            </div>
        </div>

    </section>

</main>

<!-- ================= FOOTER ================= -->
<footer class="footer">
    <p>© 2026 BAMBIKA BETCRASH. All rights reserved.</p>
</footer>

<!-- ================= SCRIPTS ================= -->
<script src="js/utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/casino.js"></script>
<script src="js/crash-engine.js"></script>
<script src="js/app.js"></script>

<!-- ================= GAME FILTER LOGIC ================= -->
<script>
    const filterButtons = document.querySelectorAll(".filter-btn");
    const gameCards = document.querySelectorAll(".game-card");

    filterButtons.forEach(btn => {
        btn.addEventListener("click", () => {

            filterButtons.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");

            const filter = btn.getAttribute("data-filter");

            gameCards.forEach(card => {
                const type = card.getAttribute("data-type");

                if (filter === "all" || filter === type) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });

        });
    });

    // GAME LAUNCHER (HOOK TO YOUR ENGINE)
    function startGame(type) {
        if (typeof window.launchGame === "function") {
            window.launchGame(type);
        } else {
            alert("Game engine not initialized: " + type);
        }
    }
</script>

</body>
  </html>
