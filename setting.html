<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - BAMBIKA BETCRASH</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/settings.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<header class="topbar">
    <div class="logo">BAMBIKA BETCRASH</div>
    <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="wallet.html">Wallet</a>
        <a href="games.html">Games</a>
        <a href="profile.html">Profile</a>
    </nav>
</header>

<!-- ================= SETTINGS CONTAINER ================= -->
<main class="settings-container">

    <h1>Settings</h1>
    <p class="subtitle">Manage your account, security, and preferences</p>

    <!-- ===== PROFILE SETTINGS ===== -->
    <section class="settings-card">
        <h2>Account</h2>

        <label>Username</label>
        <input type="text" value="Player123" disabled>

        <label>Email</label>
        <input type="email" value="player@email.com" disabled>

        <button class="btn">Edit Profile</button>
    </section>

    <!-- ===== SECURITY ===== -->
    <section class="settings-card">
        <h2>Security</h2>

        <button class="btn danger">Change Password</button>

        <label class="toggle">
            <span>Enable 2FA</span>
            <input type="checkbox">
            <span class="slider"></span>
        </label>
    </section>

    <!-- ===== PREFERENCES ===== -->
    <section class="settings-card">
        <h2>Preferences</h2>

        <label class="toggle">
            <span>Dark Mode</span>
            <input type="checkbox" checked id="themeToggle">
            <span class="slider"></span>
        </label>

        <label class="toggle">
            <span>Sound Effects</span>
            <input type="checkbox" checked>
            <span class="slider"></span>
        </label>

        <label class="toggle">
            <span>Push Notifications</span>
            <input type="checkbox" checked>
            <span class="slider"></span>
        </label>
    </section>

    <!-- ===== PRIVACY ===== -->
    <section class="settings-card">
        <h2>Privacy</h2>

        <button class="btn">Download My Data</button>
        <button class="btn danger">Delete Account</button>
    </section>

    <!-- ===== LOGOUT ===== -->
    <section class="settings-card logout-card">
        <button class="btn danger full">Logout</button>
    </section>

</main>

<!-- ================= SCRIPT ================= -->
<script src="js/app.js"></script>
<script src="js/settings.js"></script>

</body>
      </html>
